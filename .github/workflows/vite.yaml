name: github pages

on:
  push:
    branches: [ "*" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: certseeds/common-actions/actions/checkout@v1
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: 0

      - name: Set Timezone
        run: sudo timedatectl set-timezone Asia/Shanghai

      - name: Cache apt packages
        uses: certseeds/common-actions/actions/cache@v1
        with:
          path: |
            ~/.cache/apt-archives
          key: ${{ runner.os }}-apt-${{ hashFiles('**/texlive.list') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - uses: certseeds/common-actions/actions/setup-nodejs@v1

      - uses: certseeds/common-actions/actions/setup-uv@v1

      - uses: certseeds/common-actions/actions/setup-pandoc@v1
        with:
          pandoc-version: '3.8.3'

      - name: get a index page
        run: cp ./README.md ./index.md

      - name: Install dependencies
        run: pnpm install

      - name: prepare env
        working-directory: jupyter
        run: pnpm jupyter:init

      - name: install texlive deps
        run: |
          export DEBIAN_FRONTEND=noninteractive
          mkdir -p ~/.cache/apt-archives
          sudo cp ~/.cache/apt-archives/*.deb /var/cache/apt/archives/ || true
          sudo apt-get update
          sudo apt-get install -y $(cat .vitepress/texlive.list | tr '\n' ' ')
          sudo cp /var/cache/apt/archives/*.deb ~/.cache/apt-archives/ || true
          sudo chown -R $(whoami):$(whoami) ~/.cache/apt-archives || true

      - name: generate PDFs
        run: |
          pnpm \
            exec node \
            --experimental-strip-types \
            --experimental-transform-types \
              ./.vitepress/run-pdfs.ts

      - name: build
        run: pnpm run docs:build
      
      - name: jupyter build
        run: pnpm exec node ./.vitepress/run-jupyter.js

      - name: Upload artifact
        uses: certseeds/common-actions/actions/upload-pages-artifact@v1
        with:
          path: ./.vitepress/dist

  # Deployment job — only on master
  deploy:
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: certseeds/common-actions/actions/deploy-pages@v1
